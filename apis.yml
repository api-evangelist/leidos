aid: leidos
name: Leidos
description: >-
  Leidos, a Fortune 500 digital and mission innovator, delivers solutions at
  the intersection of national security, health, and critical infrastructure.
  With a global workforce of approximately 47,000, the company is executing
  its NorthStar 2030 strategy focused on five growth engines: space and
  maritime, energy infrastructure, digital modernization and cyber, mission
  software, and managed health. No public REST APIs or developer portal have
  been identified.
